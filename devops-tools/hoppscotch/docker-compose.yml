services:
  hoppscotch:
    image: hoppscotch/hoppscotch:latest
    container_name: hoppscotch
    ports:
      - "3000:3000"
      - "3170:3170"
      - "3100:3100"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - hoppscotch-network

  migrate:
    image: hoppscotch/hoppscotch-backend:latest
    container_name: hoppscotch-migrate
    env_file:
      - .env
    command: sh -c "pnpm exec prisma migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hoppscotch-network

  postgres:
    image: postgres:15-alpine
    container_name: hoppscotch-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hoppscotch
      POSTGRES_PASSWORD: hoppscotch
      POSTGRES_DB: hoppscotch
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hoppscotch -d hoppscotch" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hoppscotch-network

networks:
  hoppscotch-network:
    driver: bridge
